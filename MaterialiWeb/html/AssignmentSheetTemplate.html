<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8" />
    <title>Scheda prodotti assegnati</title>
    <style>
        .assignment-sheet {
            box-sizing: border-box;
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            padding: 18mm 16mm;
            background: #ffffff;
            color: #1f2933;
            border: 1px solid #d8dee6;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 12px;
        }

        .assignment-sheet-header {
            position: relative;
            min-height: 48px;
            text-align: center;
            margin-bottom: 22px;
        }

        .assignment-sheet-logo {
            position: absolute;
            left: 0;
            top: 0;
            max-width: 110px;
            max-height: 42px;
        }

        .assignment-sheet-ente {
            margin: 0 0 10px;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .assignment-sheet-title {
            margin: 0;
            font-size: 16px;
            font-weight: 700;
        }

        .assignment-sheet-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 28px;
            margin-bottom: 18px;
        }

        .assignment-sheet-meta div {
            border-bottom: 1px solid #b8c0cc;
            padding-bottom: 5px;
        }

        .assignment-sheet-meta span {
            display: inline-block;
            min-width: 72px;
            font-weight: 700;
        }

        .assignment-sheet-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .assignment-sheet-table th,
        .assignment-sheet-table td {
            border: 1px solid #9aa6b2;
            padding: 7px 6px;
            vertical-align: top;
            overflow-wrap: anywhere;
        }

        .assignment-sheet-table th {
            background: #eef2f6;
            font-weight: 700;
            text-align: left;
        }

        .assignment-sheet-table th:nth-child(1),
        .assignment-sheet-table td:nth-child(1) { width: 13%; }
        .assignment-sheet-table th:nth-child(2),
        .assignment-sheet-table td:nth-child(2) { width: 34%; }
        .assignment-sheet-table th:nth-child(3),
        .assignment-sheet-table td:nth-child(3) { width: 17%; }
        .assignment-sheet-table th:nth-child(4),
        .assignment-sheet-table td:nth-child(4) { width: 18%; }
        .assignment-sheet-table th:nth-child(5),
        .assignment-sheet-table td:nth-child(5) { width: 18%; }

        .assignment-sheet-empty {
            text-align: center;
            color: #64748b;
        }

        .assignment-sheet-signature {
            margin-top: 42px;
            margin-left: auto;
            width: 220px;
        }

        .assignment-sheet-signature-line {
            margin-top: 24px;
            border-bottom: 1px solid #1f2933;
            height: 1px;
        }
    </style>
</head>
<body>
    <article class="assignment-sheet">
        <header class="assignment-sheet-header">
            {{LOGO_HTML}}
            <p class="assignment-sheet-ente">{{HEADER_TEXT}}</p>
            <h1 class="assignment-sheet-title">Scheda prodotti assegnati</h1>
        </header>

        <section class="assignment-sheet-meta">
            <div><span>Cognome:</span> {{COGNOME}}</div>
            <div><span>Nome:</span> {{NOME}}</div>
            <div><span>Data:</span> {{DATA}}</div>
        </section>

        <table class="assignment-sheet-table">
            <thead>
                <tr>
                    <th>Categorico</th>
                    <th>Descrizione</th>
                    <th>Matricola</th>
                    <th>Categoria</th>
                    <th>Modello</th>
                </tr>
            </thead>
            <tbody>
                {{PRODUCT_ROWS}}
            </tbody>
        </table>

        <section class="assignment-sheet-signature">
            <div>Firma</div>
            <div class="assignment-sheet-signature-line"></div>
        </section>
    </article>
</body>
</html>
